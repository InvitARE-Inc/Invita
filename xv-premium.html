<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XV Gisselle | Invitify Premium Exclusive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --rose-gold: #e7a1b0;
            --dark: #2a2a2a;
            --glass: rgba(255, 255, 255, 0.9);
            --premium-gradient: linear-gradient(135deg, #e7a1b0 0%, #fcf6ba 50%, #d4af37 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfaf6; color: var(--dark); overflow-x: hidden; }

        /* --- HERO CON VIDEO --- */
        .hero {
            height: 100vh; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .hero video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; z-index: 0; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(0.6); }
        .hero-content { position: relative; z-index: 2; text-align: center; color: white; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(4rem, 15vw, 8rem); font-style: italic; text-shadow: 2px 2px 15px rgba(0,0,0,0.5); }
        .hero-content p { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--rose-gold); }

        /* --- CONTENIDO INMERSIVO --- */
        .premium-section {
            padding: 80px 20px; text-align: center; background-size: cover; background-position: center; background-attachment: fixed; position: relative;
        }
        .section-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(253, 250, 246, 0.85); z-index: 1; }
        
        .glass-card {
            max-width: 550px; margin: 0 auto; background: var(--glass); padding: 40px 25px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); backdrop-filter: blur(5px); position: relative; z-index: 2;
            border: 1px solid rgba(231, 161, 176, 0.2);
        }

        h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--rose-gold); margin-bottom: 30px; }

        /* --- CONTADOR --- */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 30px 0; }
        .t-box { background: #fff; padding: 20px 10px; border-radius: 20px; border: 1px solid var(--rose-gold); }
        .t-box span { display: block; font-size: 2rem; font-weight: 700; color: var(--rose-gold); }
        .t-box label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; }

        /* --- GALERÍA --- */
        .galeria-premium { display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(2, 160px); gap: 10px; }
        .galeria-premium img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; cursor: pointer; transition: 0.5s; border: 2px solid #fff; }
        .galeria-premium img:nth-child(1) { grid-column: span 3; grid-row: span 2; }
        .galeria-premium img:nth-child(2), .galeria-premium img:nth-child(3) { grid-column: span 3; }
        .galeria-premium img:hover { transform: scale(1.03); border-color: var(--rose-gold); }

        /* --- BOTONES --- */
        .btn-premium {
            display: inline-block; padding: 18px 40px; border-radius: 50px; background: var(--premium-gradient);
            color: white; text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.8rem; border: none; transition: 0.4s; cursor: pointer;
        }
        .btn-premium:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(231, 161, 176, 0.4); }

        /* --- MAPAS --- */
        .map-card { background: #fff; border-radius: 25px; padding: 20px; margin-top: 20px; border: 1px solid #eee; }
        .map-frame { width: 100%; height: 250px; border-radius: 15px; border: none; margin: 15px 0; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        #modal img { max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid var(--rose-gold); }
    </style>
</head>
<body>

    <header class="hero">
        <video autoplay muted loop playsinline>
            <source src="https://player.vimeo.com/external/459389137.sd.mp4?s=994b6388432b07e2c9f55f2f534d0b1d30f36746&profile_id=164" type="video/mp4">
        </video>
        <div class="hero-content" data-aos="zoom-in">
            <p>Invitify Premium</p>
            <h1>Gisselle</h1>
            <p>Mis Quince Años</p>
        </div>
    </header>

    <div class="scrolling-content">
        <section class="premium-section" style="background-image: url('https://images.pexels.com/photos/1385472/pexels-photo-1385472.jpeg?auto=compress&w=1200');">
            <div class="section-overlay"></div>
            <div class="glass-card" data-aos="fade-up">
                <h2>Faltan...</h2>
                <div class="timer-grid">
                    <div class="t-box"><span id="days">00</span><label>Días</label></div>
                    <div class="t-box"><span id="hours">00</span><label>Hrs</label></div>
                    <div class="t-box"><span id="mins">00</span><label>Min</label></div>
                    <div class="t-box"><span id="secs">00</span><label>Seg</label></div>
                </div>
                <button class="btn-premium" onclick="window.open('http://googleusercontent.com/calendar.google.com/26')">Agendar Fecha</button>
            </div>
        </section>

        <section class="premium-section" style="background-image: url('https://images.pexels.com/photos/1444442/pexels-photo-1444442.jpeg?auto=compress&w=1200');">
            <div class="section-overlay" style="background: rgba(253, 250, 246, 0.75);"></div>
            <div class="glass-card" data-aos="fade-up">
                <h2>Sesión Fotográfica</h2>
                <div class="galeria-premium">
                    <img src="https://images.pexels.com/photos/17834489/pexels-photo-17834489.jpeg?auto=compress&w=600" onclick="openImg(this.src)">
                    <img src="https://images.pexels.com/photos/1444442/pexels-photo-1444442.jpeg?auto=compress&w=400" onclick="openImg(this.src)">
                    <img src="https://images.pexels.com/photos/1385472/pexels-photo-1385472.jpeg?auto=compress&w=400" onclick="openImg(this.src)">
                </div>
            </div>
        </section>

        <section class="premium-section">
            <div class="glass-card" data-aos="fade-up">
                <h2>Ubicaciones</h2>
                <div class="map-card">
                    <h3>Ceremonia Religiosa</h3>
                    <p>Templo de San Antonio | 7:00 PM</p>
                    <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3702.2604246944645!2d-102.2949746!3d21.886022!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8429ee647902d295%3A0x600b83e843e9d80d!2sTemplo%20de%20San%20Antonio%20de%20Padua!5e0!3m2!1ses-419!2smx!4v1715600000000!5m2!1ses-419!2smx"></iframe>
                    <a href="https://maps.app.goo.gl/3f6vU7m6F6m6F6m6F" target="_blank" class="btn-premium">Ver en GPS</a>
                </div>
                <div class="map-card" style="margin-top: 20px;">
                    <h3>Recepción Elite</h3>
                    <p>Quinta Real | 9:00 PM</p>
                    <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3702.260481816766!2d-102.29465762395697!3d21.88607315802379!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8429ee644725ed6d%3A0x3348630985a53673!2sTemplo%20de%20San%20Antonio%20de%20Padua!5e0!3m2!1ses-419!2smx!4v1715634567890!5m2!1ses-419!2smx3"></iframe>
                    <a href="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3702.260481816766!2d-102.29465762395697!3d21.88607315802379!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8429ee644725ed6d%3A0x3348630985a53673!2sTemplo%20de%20San%20Antonio%20de%20Padua!5e0!3m2!1ses-419!2smx!4v1715634567890!5m2!1ses-419!2smx4" target="_blank" class="btn-premium">Ver en GPS</a>
                </div>
            </div>
        </section>

        <footer style="text-align:center; padding: 60px 20px; background: #fff;">
            <h3 style="font-family: 'Playfair Display', serif; color: var(--rose-gold); font-size: 2rem;">Invitify Premium</h3>
            <p style="font-size: 0.8rem; font-style: italic; opacity: 0.6;">Hacedores de invitaciones de alta gama.</p>
        </footer>
    </div>

    <div id="modal" onclick="this.style.display='none'"><img id="modal-img"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200 });
        function openImg(src) { document.getElementById('modal').style.display='flex'; document.getElementById('modal-img').src=src; }
        
        const target = new Date('July 26, 2025 19:00:00').getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
